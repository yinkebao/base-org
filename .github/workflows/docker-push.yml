name: Docker Build & Push

on:
  push:
    branches: [master, dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker-push.yml'
  workflow_dispatch:
    inputs:
      push:
        description: '构建后是否推送到 GHCR'
        type: boolean
        default: true

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: false   # 镜像推送不取消，否则留下半成品

permissions:
  contents: read
  packages: write              # 推镜像到 ghcr.io 必须

jobs:
  build-push:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # 多架构支持（arm64/amd64）。纯 amd64 可删

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ inputs.push != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          platforms: linux/amd64

      - name: Write job summary
        run: |
          echo "## 🐳 ${{ matrix.component }} 镜像已推送" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "拉取命令: \`docker pull ghcr.io/${{ github.repository }}/${{ matrix.component }}:latest\`" >> $GITHUB_STEP_SUMMARY
