name: Backend CI

on:
  push:
    branches: [master, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [master, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '是否跳过测试'
        type: boolean
        default: true

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify -DskipTests=${{ inputs.skip_tests || 'true' }}

      - name: Write job summary
        if: always()
        run: |
          echo "## Backend Build 结果" >> $GITHUB_STEP_SUMMARY
          echo "- JDK 版本: ${{ matrix.java }}" >> $GITHUB_STEP_SUMMARY
          echo "- skipTests: ${{ inputs.skip_tests || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload JAR artifact
        if: matrix.java == '17'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7
