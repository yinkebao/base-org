apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: base-org
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: kind-registry:5000/base-rog/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /login.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: base-org
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
