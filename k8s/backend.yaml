apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: base-org
type: Opaque
stringData:
  DB_PASSWORD: "postgres"
  JWT_SECRET: "change-me-in-production"
  OPENAI_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: base-org
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: kind-registry:5000/base-rog/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.docker.internal:5432/doc_assistant"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              value: "https://api.hanbbq.top"
            - name: OPENAI_CHAT_MODEL
              value: "gpt-5.4"
            - name: OPENAI_EMBEDDING_MODEL
              value: "text-embedding-3-small"
            - name: APP_AI_CHAT_PROVIDER
              value: "OPENAI_COMPATIBLE"
            - name: APP_AI_EMBEDDING_PROVIDER
              value: "OLLAMA"
            - name: OLLAMA_BASE_URL
              value: "http://host.docker.internal:11434"
            - name: OLLAMA_EMBEDDING_MODEL
              value: "bge-m3"
          readinessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: base-org
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
