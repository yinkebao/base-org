<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统仪表盘 - 智能文档与需求管理系统</title>
    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/pages/dashboard.css" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard-shell">
      <aside class="dashboard-aside" aria-label="主导航">
        <div class="dashboard-aside__brand">
          <span class="brand-icon brand-icon--large" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="16" rx="2"></rect>
              <path d="M8 9v7M12 6v10M16 11v5"></path>
            </svg>
          </span>
          <div>
            <strong>系统管理后台</strong>
            <p>研发 / PM 端</p>
          </div>
        </div>

        <nav class="dashboard-nav">
          <a class="dashboard-nav__item" data-route="overview" href="#overview">仪表盘</a>
          <a class="dashboard-nav__item" data-route="imports" href="#imports">文档管理</a>
          <a class="dashboard-nav__item" data-route="alerts" href="#alerts">AI 告警</a>
          <a class="dashboard-nav__item" data-route="requirements" href="#requirements">需求编排</a>
          <a class="dashboard-nav__item" data-route="audit" href="#audit">审计管理</a>
          <a class="dashboard-nav__item" data-route="settings" href="#settings">系统配置</a>
        </nav>

        <footer class="dashboard-aside__user">
          <div>
            <strong id="currentUserName">Admin User</strong>
            <p id="currentUserEmail">admin@system.com</p>
          </div>
          <button id="logoutBtn" class="ghost-icon-btn" type="button" aria-label="退出登录">⎋</button>
        </footer>
      </aside>

      <div class="dashboard-main">
        <header class="dashboard-header">
          <div class="search-box">
            <input id="dashboardSearch" type="search" placeholder="全局搜索任务、文档或用户..." />
          </div>
          <div class="dashboard-header__status">
            <span>系统状态：</span>
            <strong class="status-pill status-pill--ok">ONLINE</strong>
          </div>
        </header>

        <main id="dashboardContent" class="dashboard-content" aria-live="polite"></main>
      </div>
    </div>
    <script type="module" src="/src/js/main-dashboard.js"></script>
  </body>
</html>
