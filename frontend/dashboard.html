<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统仪表盘 - B-ORG</title>
    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/pages/dashboard.css" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard-shell">
      <aside class="dashboard-aside" aria-label="主导航">
        <div class="dashboard-aside__header">
          <div class="dashboard-aside__brand">
            <span class="brand-icon brand-icon--large" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                <path d="M8 9v7M12 6v10M16 11v5"></path>
              </svg>
            </span>
            <div class="dashboard-aside__brand-copy">
              <strong>系统管理后台</strong>
              <p>研发 / PM 端</p>
            </div>
          </div>
          <button id="dashboardAsideToggle" class="dashboard-aside__toggle" type="button" aria-label="收起侧边栏" aria-expanded="true">
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <path d="M11.5 5.5 7.5 10l4 4.5"></path>
              <path d="M15.5 5.5 11.5 10l4 4.5"></path>
            </svg>
          </button>
        </div>

        <nav class="dashboard-nav">
          <a class="dashboard-nav__item" data-route="overview" href="#overview">
            <span class="dashboard-nav__icon" aria-hidden="true">◫</span>
            <span class="dashboard-nav__label">仪表盘</span>
          </a>
          <a class="dashboard-nav__item" data-route="docs" href="#docs">
            <span class="dashboard-nav__icon" aria-hidden="true">▤</span>
            <span class="dashboard-nav__label">文档管理</span>
          </a>
          <a class="dashboard-nav__item" data-route="imports" href="#imports">
            <span class="dashboard-nav__icon" aria-hidden="true">⇪</span>
            <span class="dashboard-nav__label">导入向导</span>
          </a>
          <a class="dashboard-nav__item" data-route="qa" href="#qa">
            <span class="dashboard-nav__icon" aria-hidden="true">✦</span>
            <span class="dashboard-nav__label">智能问答</span>
          </a>
          <a class="dashboard-nav__item" data-route="alerts" href="#alerts">
            <span class="dashboard-nav__icon" aria-hidden="true">●</span>
            <span class="dashboard-nav__label">AI 告警</span>
          </a>
          <a class="dashboard-nav__item" data-route="audit" href="#audit">
            <span class="dashboard-nav__icon" aria-hidden="true">≣</span>
            <span class="dashboard-nav__label">审计管理</span>
          </a>
          <a class="dashboard-nav__item" data-route="settings" href="#settings">
            <span class="dashboard-nav__icon" aria-hidden="true">⊙</span>
            <span class="dashboard-nav__label">系统配置</span>
          </a>
        </nav>

      </aside>

      <div class="dashboard-main">
        <header class="dashboard-header">
          <div class="dashboard-header__status">
            <strong class="status-pill status-pill--ok">ONLINE</strong>
          </div>
          <div class="dashboard-user" data-dashboard-user-menu>
            <button
              id="dashboardUserToggle"
              class="dashboard-user__trigger"
              type="button"
              aria-label="打开用户菜单"
              aria-expanded="false"
              aria-haspopup="menu"
            >
              <span id="currentUserInitial" class="dashboard-user__avatar" aria-hidden="true">A</span>
            </button>
            <div id="dashboardUserMenu" class="dashboard-user__menu" role="menu" hidden>
              <div class="dashboard-user__identity">
                <strong id="currentUserName">Admin User</strong>
              </div>
              <button id="logoutBtn" class="dashboard-user__action" type="button" role="menuitem">
                <svg viewBox="0 0 20 20" aria-hidden="true">
                  <path d="M8 5.5H6.75A2.25 2.25 0 0 0 4.5 7.75v4.5A2.25 2.25 0 0 0 6.75 14.5H8"></path>
                  <path d="M11 6.5 14.5 10 11 13.5"></path>
                  <path d="M8.5 10h6"></path>
                </svg>
                <span>退出登录</span>
              </button>
            </div>
          </div>
        </header>

        <main id="dashboardContent" class="dashboard-content" aria-live="polite"></main>
      </div>
    </div>
    <script type="module" src="/src/js/main-dashboard.js"></script>
  </body>
</html>
