<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - B-ORG</title>
    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/pages/login.css" />
  </head>
  <body class="auth-page auth-page--login">
    <header class="top-nav" aria-label="顶部导航">
      <div class="top-nav__brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Zm8 1v5h5" />
            <path d="M8 12h8M8 16h8M8 8h3" />
          </svg>
        </span>
        <strong class="top-nav__title">B-ORG</strong>
      </div>
      <button id="languageToggle" class="lang-btn" type="button" aria-label="切换语言">
        <span aria-hidden="true">🌐</span>
        <span id="languageText">简体中文</span>
      </button>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="loginTitle">
        <div class="auth-card__header">
          <h1 id="loginTitle">欢迎回来</h1>
          <p>企业级智能文档与需求管理平台</p>
        </div>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-field">
            <label for="loginIdentity">用户名 / 邮箱</label>
            <div class="input-wrap">
              <span class="input-wrap__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="8" r="4"></circle>
                  <path d="M4 21a8 8 0 0 1 16 0"></path>
                </svg>
              </span>
              <input id="loginIdentity" name="identity" type="text" placeholder="请输入您的用户名或邮箱" autocomplete="username" required />
            </div>
            <p id="loginIdentityError" class="field-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <div class="field-head">
              <label for="loginPassword">密码</label>
              <a href="#" class="field-link">忘记密码？</a>
            </div>
            <div class="input-wrap">
              <span class="input-wrap__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                  <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                </svg>
              </span>
              <input id="loginPassword" name="password" type="password" placeholder="请输入您的密码" autocomplete="current-password" required />
              <button id="toggleLoginPassword" class="ghost-icon-btn" type="button" aria-label="显示或隐藏密码">
                <svg viewBox="0 0 24 24">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <p id="loginPasswordError" class="field-error" aria-live="polite"></p>
          </div>

          <p id="loginGlobalError" class="global-error" aria-live="assertive"></p>

          <button id="loginSubmit" class="btn btn--primary" type="submit">登录</button>

          <div class="or-divider"><span>或者</span></div>

          <button id="ssoLoginBtn" class="btn btn--secondary" type="button">
            <span aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4" y="5" width="16" height="14" rx="2"></rect>
                <path d="M8 2v6M16 2v6M4 10h16"></path>
              </svg>
            </span>
            使用企业 SSO 登录
          </button>
        </form>

        <p class="auth-card__switch">
          还没有账户？
          <a href="/register.html">立即注册</a>
        </p>
      </section>
    </main>

    <footer class="auth-footer">
      <p>© 2024 B-ORG. 保留所有权利.</p>
      <nav aria-label="页脚链接">
        <a href="#">隐私政策</a>
        <a href="#">服务条款</a>
        <a href="#">安全合规</a>
      </nav>
    </footer>
    <script type="module" src="/src/js/main-login.js"></script>
  </body>
</html>
