server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # 静态资源缓存（Vite 构建产物带 hash）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 请求代理到后端
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "http://localhost:5173";
        proxy_read_timeout 60s;
    }

    # WebSocket 代理（QA 流式对话）
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin "http://localhost:5173";
        proxy_read_timeout 300s;
    }

    # 多页面路由：各 HTML 页面直接返回
    location = /login.html { try_files $uri =404; }
    location = /register.html { try_files $uri =404; }
    location = /dashboard.html { try_files $uri =404; }

    # 默认回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
