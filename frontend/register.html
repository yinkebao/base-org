<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 - B-ORG</title>
    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/pages/register.css" />
  </head>
  <body class="auth-page auth-page--register">
    <header class="top-nav" aria-label="顶部导航">
      <div class="top-nav__brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Zm8 1v5h5" />
            <path d="M8 12h8M8 16h8M8 8h3" />
          </svg>
        </span>
        <strong class="top-nav__title">公司名称</strong>
      </div>
      <button id="languageToggle" class="lang-btn" type="button" aria-label="切换语言">
        <span aria-hidden="true">文</span>
        <span id="languageText">简体中文</span>
      </button>
    </header>

    <main class="auth-main auth-main--register">
      <section class="auth-card auth-card--register" aria-labelledby="registerTitle">
        <div class="auth-card__header">
          <h1 id="registerTitle">创建账户</h1>
          <p>加入我们，开启您的全新旅程</p>
        </div>

        <form id="registerForm" class="auth-form" novalidate>
          <div class="form-field">
            <label for="registerUsername">用户名</label>
            <div class="input-wrap input-wrap--status">
              <input id="registerUsername" name="username" type="text" autocomplete="username" placeholder="请输入用户名" required />
              <span id="usernameStatusIcon" class="status-icon" aria-hidden="true"></span>
            </div>
            <p id="registerUsernameHint" class="field-hint" aria-live="polite"></p>
            <p id="registerUsernameError" class="field-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="registerEmail">邮箱地址</label>
            <div class="input-wrap">
              <input id="registerEmail" name="email" type="email" autocomplete="email" placeholder="example@domain.com" required />
            </div>
            <p id="registerEmailError" class="field-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="registerPassword">设置密码</label>
            <div class="input-wrap">
              <input id="registerPassword" name="password" type="password" autocomplete="new-password" placeholder="至少8位字符" required />
              <button id="toggleRegisterPassword" class="ghost-icon-btn" type="button" aria-label="显示或隐藏密码">
                <svg viewBox="0 0 24 24">
                  <path d="M3 3l18 18"></path>
                  <path d="M2 12s3.5-6 10-6c2.2 0 4 .7 5.5 1.7M22 12s-3.5 6-10 6c-2.2 0-4-.7-5.5-1.7"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="strength">
              <p id="passwordStrengthText">密码强度：无</p>
              <div class="strength__bars">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
            <p id="registerPasswordError" class="field-error" aria-live="polite"></p>
          </div>

          <div class="form-field">
            <label for="registerConfirmPassword">确认密码</label>
            <div class="input-wrap">
              <input id="registerConfirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="请再次输入密码" required />
            </div>
            <p id="registerConfirmPasswordError" class="field-error" aria-live="polite"></p>
          </div>

          <div class="terms-wrap">
            <label class="checkbox-label" for="agreeTerms">
              <input id="agreeTerms" name="agreeTerms" type="checkbox" />
              <span>我已阅读并同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></span>
            </label>
            <p id="registerTermsError" class="field-error" aria-live="polite"></p>
          </div>

          <p id="registerGlobalError" class="global-error" aria-live="assertive"></p>
          <button id="registerSubmit" class="btn btn--primary btn--disabled" type="submit" disabled>立即注册</button>
        </form>

        <p class="auth-card__switch">
          已有账户？
          <a href="/login.html">立即登录</a>
        </p>
      </section>

      <section class="third-party">
        <div class="or-divider"><span>第三方注册</span></div>
        <div class="third-party__buttons">
          <button class="btn btn--secondary btn--social" type="button" aria-label="使用 Google 注册">G</button>
          <button class="btn btn--secondary btn--social" type="button" aria-label="使用 Facebook 注册">f</button>
        </div>
      </section>
    </main>

    <footer class="auth-footer">
      <p>© 2024 公司名称. 保留所有权利.</p>
    </footer>
    <script type="module" src="/src/js/main-register.js"></script>
  </body>
</html>
